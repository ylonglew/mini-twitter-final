<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Twitter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Class feed</p>
          <h1>Mini Twitter</h1>
        </div>
        <div class="status-pill" id="status-pill" aria-label="Read only">Read only</div>
      </header>

      <section class="auth-panel" aria-labelledby="auth-title">
        <h2 id="auth-title">Sign in</h2>
        <p class="auth-help" id="auth-help">
          Enter your email and Supabase will send you a magic sign-in link.
        </p>

        <form class="auth-form" id="auth-form">
          <label for="email-input">Email address</label>
          <div class="auth-controls">
            <input
              id="email-input"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
            <button type="submit" id="magic-link-button">Send magic link</button>
          </div>
        </form>

        <div class="signed-in-row hidden" id="signed-in-row">
          <p id="signed-in-message"></p>
          <button type="button" class="secondary-button" id="sign-out-button">
            Sign out
          </button>
        </div>

        <p class="auth-message" id="auth-message" aria-live="polite"></p>
      </section>

      <section class="compose-panel hidden" id="compose-panel" aria-labelledby="compose-title">
        <h2 id="compose-title">New post</h2>
        <form class="compose-form" id="compose-form">
          <div class="compose-field">
            <textarea
              id="post-body-input"
              name="body"
              placeholder="What's on your mind? (140 chars max)"
              maxlength="140"
              rows="3"
              required
            ></textarea>
            <div class="compose-footer">
              <span class="char-count" id="char-count">140</span>
              <button type="submit" id="post-button">Post</button>
            </div>
          </div>
        </form>
        <p class="compose-message hidden" id="compose-message" aria-live="polite"></p>
      </section>

      <section class="feed-panel" aria-labelledby="feed-title">
        <div class="feed-title-row">
          <h2 id="feed-title">Latest posts</h2>
          <span class="feed-count" id="feed-count">Loading...</span>
        </div>

        <p class="error-message hidden" id="error-message"></p>
        <div class="post-list" id="post-list" aria-live="polite">
          <article class="post-card loading-card">
            <div class="loading-line short"></div>
            <div class="loading-line"></div>
            <div class="loading-line"></div>
          </article>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
